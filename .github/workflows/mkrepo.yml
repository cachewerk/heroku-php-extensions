
name: Make repositories

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build extensions"]
    branches:
      - main
    types:
      - completed
  workflow_call:
    inputs:
      S3_PREFIX:
        type: string
        default: ""

jobs:

  mkrepo:
    name: Make repository
    runs-on: ubuntu-latest
    timeout-minutes: 20

    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    strategy:
      matrix:
        stack:
          - name: "heroku-22"
            prefix: "dist-heroku-22-stable/"
            prefixdevelop: "dist-heroku-22-develop/"
            os: "ubuntu-latest"
          - name: "heroku-24"
            prefix: "dist-heroku-24-amd64-stable/"
            prefixdevelop: "dist-heroku-24-amd64-develop/"
            os: "ubuntu-latest"
          - name: "heroku-24"
            prefix: "dist-heroku-24-arm64-stable/"
            prefixdevelop: "dist-heroku-24-arm64-develop/"
            os: "ubuntu-24.04-arm"

    env:
      S3_BUCKET: ${{ secrets.S3_BUCKET || 'heroku-php-extensions' }}
      S3_REGION: ${{ secrets.S3_REGION || '' }}
      S3_PREFIX: ${{ inputs.S3_PREFIX || '' }}
      BUILDPACK: ./vendor/heroku/heroku-buildpack-php

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Composer Install
        run: composer install --prefer-dist --no-progress --no-suggest --ignore-platform-reqs

      - name: Copy requirements
        run: cp ${BUILDPACK}/requirements.txt .

      - name: Build Dockerfile
        run: ./scripts/create-dockerfile.sh ${{ matrix.stack.name }}
        
      - name: Docker build
        run: ./scripts/build-dockerfile.sh ${{ matrix.stack.name }}

      - name: Make and upload repository
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          docker run --rm \
            --env-file=${BUILDPACK}/support/build/_docker/env.default \
            ${{ matrix.stack.name }} mkrepo.sh --upload
