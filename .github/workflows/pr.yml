
name: Test PR builds

on: pull_request

jobs:
  call-build:
    name: Build extensions
    uses: ./.github/workflows/build.yml
    with:
      S3_PREFIX: pull-requests/${{ github.event.number }}/
    secrets: inherit

  call-mkrepo:
    name: Make repositories
    needs: call-build
    uses: ./.github/workflows/mkrepo.yml
    with:
      S3_PREFIX: pull-requests/${{ github.event.number }}/
    secrets: inherit
